version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE_URL=http://backend:8000
    volumes:
      - ./app:/app/app
      - ./model:/app/model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sentiment-network
    restart: unless-stopped

  # Frontend UI Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: sentiment-ui
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sentiment-network
    restart: unless-stopped

networks:
  sentiment-network:
    driver: bridge
